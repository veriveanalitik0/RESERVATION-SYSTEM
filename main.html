<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Kuveyt Türk · Yapay Zeka Laboratuvarı — Kroki</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#061A12; --panel:#0B2C20; --panel2:#0F3728; --panel3:#124030;
  --line:#164836; --line2:#215E47;
  --ink:#EAF4EE; --muted:#9DC1AE; --muted2:#6E9683;
  --sheet:#FAF8F2; --grid:#E8F1EB; --wall:#13251C;
  --green:#27B368; --green-br:#3AD681; --green-soft:rgba(39,179,104,.16); --green-line:rgba(58,214,129,.5);
  --orange:#F2921C; --orange-br:#FFAA3A; --orange-soft:rgba(242,146,28,.18); --orange-line:rgba(242,146,28,.6);
  --gold:#E0A63C;
  --calisma:#23B14D; --toplanti:#00A3E8; --deneyim:#9AD9EA;
  --sistem:#A349A3; --oturma:#B97A57; --ortak:#F2921C;
  --fD:'Space Grotesk',ui-sans-serif,system-ui,sans-serif;
  --fB:'IBM Plex Sans',ui-sans-serif,system-ui,-apple-system,sans-serif;
  --fM:'IBM Plex Mono',ui-monospace,'SF Mono',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{
  background:
    radial-gradient(1100px 620px at 84% -10%, rgba(39,179,104,.20), transparent 58%),
    radial-gradient(900px 700px at -8% 112%, rgba(242,146,28,.10), transparent 55%),
    linear-gradient(180deg,#08281B 0%,#051710 100%);
  color:var(--ink); font-family:var(--fB); -webkit-font-smoothing:antialiased; line-height:1.5;
  display:flex; flex-direction:column; min-height:100dvh; position:relative;
}
body::before{ /* ince devre/mesh dokusu */
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background-image:
    repeating-linear-gradient(90deg, rgba(58,214,129,.045) 0 1px, transparent 1px 92px),
    repeating-linear-gradient(0deg, rgba(58,214,129,.045) 0 1px, transparent 1px 92px);
  mask-image:radial-gradient(120% 90% at 50% 0%, #000 30%, transparent 85%);
}
body>*{position:relative; z-index:1}

/* ---------- Header ---------- */
header{
  padding:20px clamp(16px,4vw,40px) 18px; border-bottom:1px solid var(--line);
  background:linear-gradient(180deg, rgba(15,55,40,.72), rgba(6,26,18,.35));
  backdrop-filter:blur(8px);
  display:flex; flex-wrap:wrap; gap:20px 30px; align-items:center; justify-content:space-between;
}
.brandwrap{display:flex; align-items:center; gap:18px; min-width:0}
.logo-mark{flex:none; position:relative; display:grid; place-items:center; padding:2px 8px}
.logo-mark::before{content:""; position:absolute; inset:-12px -16px; background:radial-gradient(58% 70% at 50% 44%, rgba(58,214,129,.22), rgba(58,214,129,.04) 55%, transparent 72%); filter:blur(8px); z-index:0}
.logo-mark img{position:relative; z-index:1; height:74px; width:auto; filter:drop-shadow(0 4px 11px rgba(0,0,0,.5))}
.brand{display:flex; flex-direction:column; gap:5px; min-width:0}
.eyebrow{
  font-family:var(--fM); font-size:11.5px; letter-spacing:.24em; text-transform:uppercase;
  color:var(--green-br); font-weight:600; display:flex; align-items:center; gap:9px;
}
.eyebrow b{color:var(--gold); font-weight:700}
h1{font-family:var(--fD); font-weight:700; letter-spacing:-.02em; font-size:clamp(22px,4vw,34px); margin:0; line-height:1.03}
.brand p{margin:2px 0 0; color:var(--muted); font-size:14px; max-width:50ch}

.stats{display:flex; flex-wrap:wrap; gap:10px}
.stat{
  background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line);
  border-radius:13px; padding:9px 15px; display:flex; flex-direction:column; min-width:82px; position:relative; overflow:hidden;
}
.stat::after{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--green)}
.stat.hot::after{background:var(--orange)}
.stat b{font-family:var(--fD); font-size:21px; font-weight:700; line-height:1}
.stat.hot b{color:var(--orange-br)}
.stat span{font-family:var(--fM); font-size:10px; letter-spacing:.11em; text-transform:uppercase; color:var(--muted2); margin-top:5px}

/* ---------- Toolbar ---------- */
.toolbar{padding:14px clamp(16px,4vw,40px); display:flex; flex-wrap:wrap; gap:14px 18px; align-items:center; justify-content:space-between}
.filters{display:flex; flex-wrap:wrap; gap:8px; align-items:center}
.filters .lbl{font-family:var(--fM); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted2); margin-right:4px}
.chip{
  font-family:var(--fB); font-size:13px; font-weight:500; color:var(--ink);
  background:var(--panel); border:1px solid var(--line); border-radius:999px;
  padding:7px 13px 7px 10px; display:inline-flex; align-items:center; gap:8px; cursor:pointer;
  transition:border-color .15s, background .15s, transform .1s, color .15s;
}
.chip:hover{border-color:var(--line2); background:var(--panel2)}
.chip:active{transform:translateY(1px)}
.chip .dot{width:11px; height:11px; border-radius:4px; flex:none; box-shadow:inset 0 0 0 1px rgba(0,0,0,.3)}
.chip[aria-pressed="true"]{background:var(--green-soft); border-color:var(--green-line); color:#fff; box-shadow:0 0 0 1px var(--green-line), 0 0 16px -4px var(--green)}
.chip.all .dot{background:conic-gradient(from 210deg,var(--calisma),var(--toplanti),var(--sistem),var(--oturma),var(--ortak),var(--calisma))}
.chip:focus-visible{outline:2px solid var(--orange); outline-offset:2px}

.zoom{display:flex; align-items:center; gap:6px}
.zbtn{
  height:34px; min-width:34px; padding:0 10px; display:grid; place-items:center; cursor:pointer;
  background:var(--panel); border:1px solid var(--line); border-radius:10px; color:var(--ink);
  font-size:17px; font-family:var(--fD); transition:border-color .15s, background .15s;
}
.zbtn:hover{border-color:var(--line2); background:var(--panel2)}
.zbtn:focus-visible{outline:2px solid var(--orange); outline-offset:2px}
.zlabel{font-family:var(--fM); font-size:12px; color:var(--muted); min-width:42px; text-align:center}

/* ---------- Stage ---------- */
.stage{
  flex:1; margin:4px clamp(12px,3vw,32px) clamp(16px,3vw,28px);
  border:1px solid var(--line); border-radius:18px; position:relative; overflow:auto;
  padding:clamp(14px,3vw,34px);
  background:radial-gradient(130% 120% at 50% -5%, #0c3324 0%, #072016 70%);
  box-shadow:inset 0 1px 0 rgba(58,214,129,.06);
  scrollbar-color:var(--line2) transparent;
}
.canvas{width:calc(100% * var(--zoom,1)); min-width:320px; margin:0 auto; transition:width .18s ease}
.sheet{
  width:100%; border-radius:12px; overflow:hidden; display:block;
  box-shadow:0 30px 70px -26px rgba(0,0,0,.85), 0 0 0 1px rgba(58,214,129,.18), 0 0 60px -20px rgba(39,179,104,.25);
  opacity:0; transform:translateY(10px); animation:rise .55s cubic-bezier(.2,.7,.3,1) .05s forwards;
}
@keyframes rise{to{opacity:1; transform:none}}
svg.plan{display:block; width:100%; height:auto}

.wall{fill:none; stroke:var(--wall); stroke-width:6; stroke-linejoin:round; stroke-linecap:square}
.iwall{fill:none; stroke:var(--wall); stroke-width:6; stroke-linejoin:round}
.dwall{fill:none; stroke:var(--wall); stroke-width:5; stroke-dasharray:20 16; stroke-linecap:round}
.col{fill:var(--wall)}
.gtext{font-family:var(--fD); font-weight:700; fill:#20372c; letter-spacing:.02em}

.room{cursor:pointer}
.room .shape{stroke:var(--wall); stroke-width:6; stroke-linejoin:round; transition:stroke .15s, stroke-width .15s, filter .15s, fill .15s, opacity .22s; pointer-events:all}
.room.plain .shape{stroke:none; fill:transparent}
.room text{pointer-events:none; font-family:var(--fD); font-weight:700}

.room:hover .shape,.room:focus-visible .shape{filter:drop-shadow(0 0 10px var(--orange))}
.room:not(.plain):hover .shape,.room:not(.plain):focus-visible .shape{stroke:var(--orange); stroke-width:13}
.room.plain:hover .shape,.room.plain:focus-visible .shape{fill:var(--orange-soft)}
.room:focus{outline:none}
.room.sel .shape{filter:drop-shadow(0 0 13px var(--orange))}
.room:not(.plain).sel .shape{stroke:var(--orange); stroke-width:14}
.room.plain.sel .shape{fill:var(--orange-soft)}
#rooms.dim .room:not(.on){opacity:.14}
#rooms.dim .room:not(.on) text{opacity:.4}

/* tooltip */
.tip{
  position:fixed; z-index:40; pointer-events:none; opacity:0; transform:translateY(4px);
  background:#06180F; color:#fff; border:1px solid var(--line2);
  padding:6px 11px; border-radius:9px; font-size:12.5px; font-weight:500;
  box-shadow:0 10px 26px -8px rgba(0,0,0,.75); transition:opacity .12s, transform .12s; white-space:nowrap;
}
.tip.on{opacity:1; transform:none}
.tip small{color:var(--gold); font-family:var(--fM); font-size:10.5px; margin-left:8px; letter-spacing:.06em}

/* ---------- Modal ---------- */
.backdrop{position:fixed; inset:0; z-index:50; display:none; align-items:center; justify-content:center; background:rgba(3,12,8,.66); backdrop-filter:blur(6px); padding:20px}
.backdrop.open{display:flex; animation:fade .2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{
  width:min(500px,100%); background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line2);
  border-radius:20px; overflow:hidden; position:relative;
  box-shadow:0 44px 90px -30px rgba(0,0,0,.85), 0 0 0 1px rgba(58,214,129,.12);
  animation:pop .28s cubic-bezier(.2,.8,.3,1);
}
@keyframes pop{from{opacity:0; transform:translateY(14px) scale(.98)}to{opacity:1; transform:none}}
.m-accent{height:5px; width:100%}
.m-media{position:relative; width:100%; aspect-ratio:16/9; background:#06180F; overflow:hidden}
.m-media img{width:100%; height:100%; object-fit:cover; display:none}
.m-ph{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; text-align:center; padding:16px}
.m-ph svg{width:38px; height:38px; opacity:.85}
.m-ph .t{font-family:var(--fD); font-weight:600; font-size:14px; color:var(--ink)}
.m-ph .m-ph-file{font-family:var(--fM); font-size:11.5px; color:var(--muted); background:rgba(0,0,0,.28); border:1px solid var(--line2); padding:4px 9px; border-radius:7px}
.m-close{position:absolute; top:12px; right:12px; z-index:2; width:34px; height:34px; border-radius:10px; background:rgba(0,0,0,.42); border:1px solid var(--line2); color:#fff; cursor:pointer; display:grid; place-items:center; font-size:18px; line-height:1; transition:.15s; backdrop-filter:blur(4px)}
.m-close:hover{background:rgba(0,0,0,.62)}
.m-close:focus-visible{outline:2px solid var(--orange); outline-offset:2px}
.m-body{padding:20px 24px 24px}
.m-badge{display:inline-flex; align-items:center; gap:8px; padding:5px 11px; border-radius:999px; font-family:var(--fM); font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase}
.m-badge .d{width:9px; height:9px; border-radius:3px; box-shadow:inset 0 0 0 1px rgba(0,0,0,.3)}
.m-title{font-family:var(--fD); font-weight:700; font-size:25px; letter-spacing:-.01em; margin:0}
.m-desc{color:var(--muted); font-size:14.5px; margin:0 0 16px}
.m-rows{display:flex; flex-direction:column; border:1px solid var(--line); border-radius:12px; overflow:hidden}
.m-row{display:flex; justify-content:space-between; gap:16px; padding:11px 15px; font-size:14px}
.m-row:not(:last-child){border-bottom:1px solid var(--line)}
.m-row .k{color:var(--muted); font-family:var(--fM); font-size:12px; letter-spacing:.05em; text-transform:uppercase}
.m-row .v{font-weight:600}

footer{padding:0 clamp(16px,4vw,40px) 18px; color:var(--muted2); font-size:12px; font-family:var(--fM); letter-spacing:.03em; display:flex; align-items:center; gap:10px; flex-wrap:wrap}
footer .kt{color:var(--green-br)}

@media (max-width:640px){
  header{flex-direction:column; align-items:flex-start; gap:16px}
  .stats{width:100%} .stat{flex:1}
  .backdrop{align-items:flex-end; padding:0}
  .modal{width:100%; border-radius:22px 22px 0 0; animation:sheetup .3s cubic-bezier(.2,.8,.3,1)}
  @keyframes sheetup{from{transform:translateY(100%)}to{transform:none}}
}
@media (prefers-reduced-motion:reduce){*{animation-duration:.001ms !important; transition-duration:.001ms !important}}
/* --- durum (müsait/rezerve) --- */
.stat.ok::after{background:#22C55E}
.stat.busy::after{background:#E5484D}
.stat.ok b{color:#54D98C}
.stat.busy b{color:#F08A8C}
.mtitle-row{display:flex; align-items:center; flex-wrap:wrap; gap:9px; margin:13px 0 4px}
.m-status{display:inline-flex; align-items:center; gap:7px; padding:4px 10px; border-radius:999px; font-family:var(--fM); font-size:10.5px; font-weight:600; letter-spacing:.08em; text-transform:uppercase}
.m-status .d{width:8px; height:8px; border-radius:50%}
.m-status.ok{background:rgba(34,197,94,.15); color:#8FE9AE; border:1px solid rgba(34,197,94,.42)}
.m-status.ok .d{background:#22C55E}
.m-status.busy{background:rgba(229,72,77,.15); color:#F6A9AB; border:1px solid rgba(229,72,77,.45)}
.m-status.busy .d{background:#E5484D}
.filters .sep{width:1px; height:22px; background:var(--line2); margin:0 6px; opacity:.7}
.chip.st-ok[aria-pressed="true"]{background:rgba(34,197,94,.16); border-color:rgba(34,197,94,.5); box-shadow:0 0 0 1px rgba(34,197,94,.5), 0 0 16px -4px #22C55E; color:#fff}
.chip.st-busy[aria-pressed="true"]{background:rgba(229,72,77,.16); border-color:rgba(229,72,77,.5); box-shadow:0 0 0 1px rgba(229,72,77,.5), 0 0 16px -4px #E5484D; color:#fff}

/* --- 2D/3D görünüm segmenti --- */
.viewseg{display:inline-flex; gap:3px; padding:3px; border:1px solid var(--line); border-radius:12px; background:var(--panel)}
.vbtn{border:0; background:transparent; color:var(--muted); font-family:var(--fD); font-weight:600; font-size:13px; letter-spacing:.02em; padding:7px 14px; border-radius:9px; cursor:pointer; transition:background .15s, color .15s}
.vbtn:hover{color:var(--ink)}
.vbtn:focus-visible{outline:2px solid var(--orange); outline-offset:2px}
.vbtn[aria-pressed="true"]{background:linear-gradient(180deg,var(--green),#1E9C58); color:#052012; box-shadow:0 2px 10px -3px rgba(39,179,104,.6)}

/* --- 3D sahne --- */
#view3d{
  display:none; flex:1; margin:4px clamp(12px,3vw,32px) clamp(16px,3vw,28px);
  border:1px solid var(--line); border-radius:18px; position:relative; overflow:hidden;
  background:radial-gradient(130% 130% at 50% -10%, #0d3626 0%, #061a12 68%);
  box-shadow:inset 0 1px 0 rgba(58,214,129,.06);
  touch-action:none;
}
#view3d::before{ content:''; position:absolute; inset:0; z-index:-1; background-image:var(--wm,none); background-repeat:no-repeat; background-position:center 47%; background-size:64%; opacity:0.06; filter:grayscale(1) brightness(2.3); pointer-events:none; }
#view3d canvas{display:block; width:100%; height:100%; outline:none}
#view3d .v3msg{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:9px; text-align:center; color:var(--muted); font-family:var(--fD); font-weight:600; padding:26px}
#view3d .v3msg small{font-family:var(--fB); font-weight:400; font-size:12.5px; color:var(--muted2); max-width:320px; line-height:1.5}
#view3d .v3spin{width:34px; height:34px; border:3px solid var(--line2); border-top-color:var(--green-br); border-radius:50%; animation:v3sp .8s linear infinite}
@keyframes v3sp{to{transform:rotate(360deg)}}
.v3hint{position:absolute; left:14px; bottom:14px; display:flex; flex-wrap:wrap; gap:7px 15px; align-items:center; padding:9px 15px; border-radius:13px; background:rgba(6,22,15,.66); border:1px solid var(--line2); backdrop-filter:blur(9px); color:var(--muted); font-family:var(--fM); font-size:11px; pointer-events:none; z-index:3; max-width:calc(100% - 28px)}
.v3hint b{color:var(--ink); font-weight:600}
.v3hint .k{display:inline-block; padding:1px 6px; border:1px solid var(--line2); border-radius:6px; color:var(--ink); background:rgba(255,255,255,.04); margin-right:5px}
.v3nav{position:absolute; top:14px; right:14px; z-index:4; width:214px; padding:12px 13px; border-radius:14px; background:rgba(6,22,15,.84); border:1px solid var(--line2); backdrop-filter:blur(10px); box-shadow:0 12px 34px -12px rgba(0,0,0,.7); font-family:var(--fB); color:var(--ink)}
.v3nav-t{font-family:var(--fD); font-weight:600; font-size:12.5px; color:var(--muted); margin-bottom:2px; letter-spacing:.02em}
.v3nav-r{display:flex; gap:7px; align-items:center; margin-top:9px}
.v3nav input{flex:1; min-width:0; background:var(--panel); border:1px solid var(--line2); color:var(--ink); border-radius:9px; padding:7px 10px; font-family:var(--fM); font-size:13px; outline:none}
.v3nav input:focus{border-color:var(--green-br)}
.v3nav button{border:0; border-radius:9px; padding:7px 12px; font-family:var(--fD); font-weight:600; font-size:12.5px; cursor:pointer; background:linear-gradient(180deg,var(--green),#1E9C58); color:#052012; white-space:nowrap}
.v3nav button.sec{background:var(--panel2); color:var(--muted); border:1px solid var(--line2)}
.v3nav button:hover{filter:brightness(1.08)}
.v3nav #v3navmsg{font-family:var(--fM); font-size:11px; line-height:1.3}
.v3nav #v3navmsg.ok{color:var(--green-br)}
.v3nav #v3navmsg.err{color:#E5484D}
.v3rot{position:absolute; right:14px; bottom:14px; z-index:4; display:inline-flex; align-items:center; gap:7px; padding:8px 13px; border-radius:12px; border:1px solid var(--line2); background:rgba(6,22,15,.72); backdrop-filter:blur(9px); color:var(--muted); font-family:var(--fD); font-weight:600; font-size:12.5px; cursor:pointer; transition:background .15s,color .15s,border-color .15s}
.v3rot:hover{color:var(--ink)}
.v3rot .ic{display:inline-block; font-size:15px; line-height:1}
.v3rot.on{background:linear-gradient(180deg,var(--green),#1E9C58); color:#052012; border-color:transparent}
.v3rot.on .ic{animation:v3icrot 3s linear infinite}
@keyframes v3icrot{to{transform:rotate(360deg)}}
.v3full{position:absolute; left:14px; top:14px; z-index:4; display:inline-flex; align-items:center; justify-content:center; width:38px; height:38px; border-radius:11px; border:1px solid var(--line2); background:rgba(6,22,15,.72); backdrop-filter:blur(9px); color:var(--muted); cursor:pointer; transition:background .15s,color .15s,border-color .15s}
.v3full:hover{color:var(--ink)}
.v3full.on{background:linear-gradient(180deg,var(--green),#1E9C58); color:#052012; border-color:transparent}
</style>
</head>
<body>

function shapeCenter(s){
  if(s.t==='rect') return [s.x+s.w/2, s.y+s.h/2];
  let sx=0,sy=0,n=s.pts.length/2;
  for(let i=0;i<s.pts.length;i+=2){sx+=s.pts[i];sy+=s.pts[i+1];}
  return [sx/n, sy/n];
}
function bboxOf(s){
  if(s.t==='rect') return [s.x,s.y,s.x+s.w,s.y+s.h];
  let xs=[],ys=[]; for(let i=0;i<s.pts.length;i+=2){xs.push(s.pts[i]);ys.push(s.pts[i+1]);}
  return [Math.min.apply(0,xs),Math.min.apply(0,ys),Math.max.apply(0,xs),Math.max.apply(0,ys)];
}

}

      crossfade(stage, wrap, function(){ three.setPose(0); three.resize(); three.start(); }, function(){

    });
  }
  // 3D -> 2D: önce düzleştir, sonra 2D'yi göster
  function goTo2D(){

    if(three.clearRoute) three.clearRoute();

    });
  }

  // düz uç noktada hızlı çapraz geçiş (asıl efekt morph'ta)
  function crossfade(outEl, inEl, prep, done){
    outEl.style.transition='opacity 150ms ease';
    outEl.style.opacity='0';
    setTimeout(function(){
      outEl.style.display='none'; outEl.style.transition='';
      inEl.style.display='block';
      if(prep){ try{ prep(); }catch(_){} }
      inEl.style.transition='none'; inEl.style.opacity='0'; void inEl.offsetWidth;
      inEl.style.transition='opacity 170ms ease';
      requestAnimationFrame(function(){ inEl.style.opacity='1'; });
      setTimeout(function(){ inEl.style.transition=''; if(done)done(); }, 180);
    }, 160);
  }

      catch(err){ console.error(err); initing=false; hideToast(); wrap.innerHTML='<div class="v3msg"><div>3D görünüm başlatılamadı</div><small>'+((err&&err.message)||'')+'</small></div>'; cb(false); return; }

    }, function(){

      wrap.innerHTML='<div class="v3msg"><div>3D görünüm için internet bağlantısı gerekiyor</div><small>three.js kütüphanesi yüklenemedi. 2D görünüm sorunsuz çalışmaya devam eder.</small></div>';

  }

  function build(container){

    function ptsOf(s){ if(s.t==='rect') return [[s.x,s.y],[s.x+s.w,s.y],[s.x+s.w,s.y+s.h],[s.x,s.y+s.h]]; var a=[]; for(var i=0;i<s.pts.length;i+=2) a.push([s.pts[i],s.pts[i+1]]); return a; }
    function centerOf(pts){ var mnx=1e9,mny=1e9,mxx=-1e9,mxy=-1e9; pts.forEach(function(p){mnx=Math.min(mnx,p[0]);mny=Math.min(mny,p[1]);mxx=Math.max(mxx,p[0]);mxy=Math.max(mxy,p[1]);}); return [(mnx+mxx)/2,(mny+mxy)/2]; }
    function shape(pts){ var sh=new THREE.Shape(); pts.forEach(function(p,i){ var X=p[0]-CX, Y=CZ-p[1]; if(i===0) sh.moveTo(X,Y); else sh.lineTo(X,Y); }); return sh; }

    // taban plakası (bahçe avlusu boşluklu) — dış duvarları tamamen kapsasın diye dışa genişletildi
    function offsetOut(pts, D){
      var n=pts.length, cx=0, cy=0, i;
      for(i=0;i<n;i++){ cx+=pts[i][0]; cy+=pts[i][1]; } cx/=n; cy/=n;
      var res=[];
      for(i=0;i<n;i++){
        var p=pts[(i-1+n)%n], c=pts[i], q=pts[(i+1)%n];
        var e1x=c[0]-p[0], e1y=c[1]-p[1], l1=Math.hypot(e1x,e1y)||1;
        var e2x=q[0]-c[0], e2y=q[1]-c[1], l2=Math.hypot(e2x,e2y)||1;

    // ---------- ETKİNLİK ALANI: anfi + kürsü (band üstte; koltuklar aşağı, alt-orta kürsüye bakar) ----------
    (function(){

    // ---------- Mutfak & Salon mobilyaları + başlangıç işareti ----------

    function fbox(px,pz,w,h,d,col,y0,roughv){ var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d), new THREE.MeshStandardMaterial({color:new THREE.Color(col), roughness:roughv||0.82, metalness:0.02})); m.position.set(px-CX,(y0||0)+h/2,pz-CZ); furn.add(m); return m; }
    // MUTFAK (x868-1207, y478-716): alt dolap + tezgah (lavabo delikli) + görünür gömük lavabo + üst dolap

    (function(){ var mat=new THREE.MeshStandardMaterial({color:0x9AA0A4, metalness:0.45, roughness:0.35});

    fbox(1127,970,54,30,54, 0xB7BCC0, 0); fbox(1161,970,14,42,54, 0xAAB0B4, 0);   // sağ koltuk

    var startCore=new THREE.Mesh(new THREE.RingGeometry(19,23,30), new THREE.MeshBasicMaterial({color:0x39E084, transparent:true, opacity:0.7, side:THREE.DoubleSide})); startCore.rotation.x=-Math.PI/2; startMk.add(startCore);
    var startPulses=[];
    for(var spi=0;spi<3;spi++){ var pr=new THREE.Mesh(new THREE.RingGeometry(0.94,1.0,44), new THREE.MeshBasicMaterial({color:0x39E084, transparent:true, opacity:0.5, side:THREE.DoubleSide})); pr.rotation.x=-Math.PI/2; startMk.add(pr); startPulses.push(pr); }
    function markerUpdate(tt){

      // diğer çalışma odalarını saydamlaştır, hedefi vurgula
      dimForRoute(r.id);
      targetMesh=primary[r.id]||null; targetGroup=null;
      for(var q=0;q<roomGroups.length;q++){ if(roomGroups[q].userData.room.id===r.id){ targetGroup=roomGroups[q]; break; } }
      routeActive=true;
      return {ok:true, msg:'Güzergah: Giriş 1 → '+((CI[r.id]&&CI[r.id].name)||r.id)};
    }
    function routeUpdate(nowms){
      if(!routeActive||!curve) return;
      var t=nowms*0.001, i;
      for(i=0;i<chevrons.length;i++){
        var u=(chevBaseU[i]+t*flowSpeed)%1; if(u<0)u+=1;
        var p=curve.getPointAt(u), tn=curve.getTangentAt(u);
        chevrons[i].position.set(p.x, chevY, p.z);
        chevrons[i].rotation.y=-Math.atan2(tn.z,tn.x);
        var fin=Math.min(1,u/0.05), fout=Math.min(1,(1-u)/0.05);
        chevrons[i].material.opacity=0.97*Math.max(0,Math.min(fin,fout));
        var mix=0.5+0.5*Math.sin((u*4.5 - t*1.7)*6.28318);
        chevrons[i].material.color.setRGB(GRN[0]+(ORG[0]-GRN[0])*mix, GRN[1]+(ORG[1]-GRN[1])*mix, GRN[2]+(ORG[2]-GRN[2])*mix);
      }
      var pulse=0.5+0.5*Math.sin(t*3.2);
      if(targetMesh&&targetMesh.material&&targetMesh.material.emissive) targetMesh.material.emissive.setRGB(0.30*pulse,0.62*pulse,0.20*pulse);
      if(targetGroup){ var bl=0.74+0.26*(0.5+0.5*Math.sin(t*2.5)); targetGroup.traverse(function(o){ if(o.material&&o.material.userData.baseOp!=null){ o.material.transparent=true; o.material.opacity=o.material.userData.baseOp*bl; } }); }
      if(targetArrow){ var s=1+0.15*Math.sin(t*4.5); targetArrow.scale.set(s,1,s); if(targetArrowMat) targetArrowMat.opacity=0.6+0.4*pulse; }
    }

    // ---- köşe paneli (oda ID) ----
    var nav=document.createElement('div'); nav.className='v3nav';
    nav.innerHTML='<div class="v3nav-t">Yol tarifi · Giriş 1 →</div><div class="v3nav-r"><input id="v3navid" inputmode="numeric" placeholder="oda no (ör. 14)" autocomplete="off"><button id="v3navgo">Göster</button></div><div class="v3nav-r"><button id="v3navclr" class="sec">Temizle</button><span id="v3navmsg"></span></div>';
    container.appendChild(nav);
    var navIn=nav.querySelector('#v3navid'), navMsg=nav.querySelector('#v3navmsg');
    function doRoute(){ var res=route(navIn.value); navMsg.textContent=res.msg||''; navMsg.className=res.ok?'ok':'err'; }
    nav.querySelector('#v3navgo').addEventListener('click', doRoute);
    nav.querySelector('#v3navclr').addEventListener('click', function(){ clearRoute(); navMsg.textContent=''; navIn.value=''; });
    navIn.addEventListener('keydown', function(e){ if(e.key==='Enter'){ e.preventDefault(); doRoute(); } });

    // otomatik dönüş modu (yavaş, sergileme gibi)
    var autoRot=false, lastLoopT=nowMs();
    var rotBtn=document.createElement('button'); rotBtn.className='v3rot'; rotBtn.innerHTML='<span class="ic">\u21BB</span> Otomatik dönüş';
    container.appendChild(rotBtn);
    rotBtn.addEventListener('click', function(){ autoRot=!autoRot; rotBtn.classList.toggle('on', autoRot); });

    // tam ekran düğmesi
    var fullBtn=document.createElement('button'); fullBtn.className='v3full'; fullBtn.title='Tam ekran';
    fullBtn.innerHTML='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/></svg>';
    container.appendChild(fullBtn);
    function fsElem(){ return document.fullscreenElement||document.webkitFullscreenElement||null; }
    fullBtn.addEventListener('click', function(){
      if(!fsElem()){ var rq=container.requestFullscreen||container.webkitRequestFullscreen; if(rq) rq.call(container); }
      else { var ex=document.exitFullscreen||document.webkitExitFullscreen; if(ex) ex.call(document); }
    });
    function onFs(){
      var fs = fsElem()===container;
      fullBtn.classList.toggle('on', fs);
      var bd=document.getElementById('backdrop'), tp=document.getElementById('tip');
      if(fs){ if(bd)container.appendChild(bd); if(tp)container.appendChild(tp); }   // tam ekranda kartlar #view3d içinde olsun ki görünsün
      else { if(bd)document.body.appendChild(bd); if(tp)document.body.appendChild(tp); }
      setTimeout(resize, 80);
    }
    document.addEventListener('fullscreenchange', onFs); document.addEventListener('webkitfullscreenchange', onFs);

    var raf=null;
    function loop(){
      raf=requestAnimationFrame(loop);
      var now=nowMs(), dt=Math.min(70, now-lastLoopT); lastLoopT=now;
      if(morphing){
        var t=(now-mStart)/mDur, end=false; if(t>=1){ t=1; end=true; }
        var e = t<0.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;   // easeInOutQuad
        var p = mFromH + (mToH-mFromH)*e; morphP=p;
        applyHeights(p);
        cT = camS.th + (camE.th-camS.th)*e;
        cP = camS.ph + (camE.ph-camS.ph)*e;
        cR = camS.r  + (camE.r -camS.r )*e;
        target.y = camS.ty + (camE.ty-camS.ty)*e;
        theta=cT; phi=cP; radius=cR;
        setCamPos();
        if(end){ morphing=false; if(mDone){ var d=mDone; mDone=null; d(); } }
      } else {
        if(autoRot) theta -= 0.00012*dt;                  // yavaş otomatik 360° dönüş (~50 sn/tur)
        cT+=(theta-cT)*0.16; cP+=(phi-cP)*0.16; cR+=(radius-cR)*0.16; setCamPos();
      }
      routeUpdate(now);
      markerUpdate(now*0.001);
      renderer.render(scene,camera);
    }
    function start(){ if(!raf) loop(); }
    function stop(){ if(raf){ cancelAnimationFrame(raf); raf=null; } }
    function resize(){ var w=container.clientWidth, h=container.clientHeight; if(!w||!h)return; camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h,false); }
    window.addEventListener('resize', resize);
    if(window.ResizeObserver){ try{ new ResizeObserver(resize).observe(container); }catch(_){} }

    setPose(1);
    return {start:start, stop:stop, resize:resize, applyFilter:applyFilter, setPose:setPose, morphTo:morphTo, route:route, clearRoute:clearRoute};
  }
})();
</script>
</body>
</html>
