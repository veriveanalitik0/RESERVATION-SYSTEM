# Frontend production nginx — SPA statik servis + /api backend reverse proxy.
# NOT: Bu sunucu HTTP/80 terminate eder. Gerçek production'da önünde TLS
# termination (LB veya nginx 443) olmalı ve X-Forwarded-Proto=https iletmeli;
# backend `trust proxy: 1` ile bu başlığı okuyup secure cookie üretir.

# Docker embedded DNS — backend container IP'si yeniden başlatmada değişirse
# nginx'in eski IP'yi cache'leyip 502 vermemesi için runtime çözümleme.
resolver 127.0.0.11 valid=10s ipv6=off;

# Önünde TLS-termination yapan bir LB/proxy varsa onun gönderdiği
# X-Forwarded-Proto'yu KORU (https). Yoksa bu sunucunun $scheme'ine (http) düş.
# Böylece backend secure-cookie kararı doğru proto ile alınır.
map $http_x_forwarded_proto $forwarded_proto {
    default $scheme;
    https   https;
    http    http;
}

server {
    # Non-root (nginx-unprivileged) imajı ayrıcalıksız 8080 portunu dinler;
    # önündeki LB/compose host portunu (80/443) buraya map'ler.
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Yükleme boyutu (görsel/veri ihracı) için makul sınır.
    client_max_body_size 12m;

    # Sıkıştırma — JS bundle ~700KB; gzip ile ~5x küçülür. SSE (text/event-stream)
    # gzip_types'ta olmadığı için etkilenmez.
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/css
        text/plain
        application/javascript
        application/json
        image/svg+xml
        font/woff2;

    # Güvenlik başlıkları (server-level — alt location'lar add_header eklerse
    # bunları tekrar etmeli; aşağıda /assets ve /api'de tekrarlanıyor).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hash'li statik varlıklar — uzun süreli immutable cache.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # API → backend reverse proxy.
    location /api/ {
        # Değişkenle proxy_pass → resolver ile runtime DNS çözümü.
        set $backend_upstream http://backend:4000;
        proxy_pass $backend_upstream;
        # NOT: Güvenlik başlıkları backend helmet'ten gelir (nginx tekrar eklemez —
        # duplicate olmasın). Backend down ise nginx hata sayfası statiktir.
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $forwarded_proto;

        # SSE (realtime bildirim akışı /api/.../stream) — tamponlamayı kapat,
        # bağlantıyı uzun süre açık tut.
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # SPA fallback — bilinmeyen route'lar index.html'e (client-side routing).
    location / {
        # Doküman (index.html) güvenlik başlıkları — CSP + HSTS dahil
        # (app_security §1 A02). NOT: bir location'a add_header eklenince
        # server-level add_header'lar MİRAS ALINMAZ; temel başlıklar burada
        # tekrar edilir. /api bloğu add_header taşımadığı için bu CSP'yi
        # ALMAZ → backend helmet CSP'siyle çakışma olmaz.
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self'; style-src-attr 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        try_files $uri $uri/ /index.html;
    }
}
